# PostgreSQL 16 + PostGIS 3.4 for the Air Quality Intelligence platform.
# Usage:
#   docker compose up -d            # start
#   docker compose logs -f db       # tail logs
#   docker compose down             # stop (keeps data volume)
#   docker compose down -v          # stop AND delete the data volume
#
# The data volume (pgdata) persists across restarts so your seeded Pune
# stations/sources survive `docker compose down && up`.

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: aqi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aqi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aqi_pass}
      POSTGRES_DB: ${POSTGRES_DB:-aqi}
      # Faster, safer fsync-off for local dev only. Remove for production.
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount our schema.sql so it runs automatically on first init of an
      # EMPTY data volume (Postgres runs *.sql in docker-entrypoint-initdb.d
      # only when the data dir is first created).
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      # PostGIS must be creatable for the DB to be considered "ready".
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aqi} -d ${POSTGRES_DB:-aqi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: aqi-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-aqi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aqi_pass}
      - POSTGRES_DB=${POSTGRES_DB:-aqi}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - OWM_API_KEY=${OWM_API_KEY}
      - OWM_API_TIMEOUT=${OWM_API_TIMEOUT:-10}
      - CPCB_API_KEY=${CPCB_API_KEY}
      - CPCB_API_TIMEOUT=${CPCB_API_TIMEOUT:-10}
      - DB_ECHO=${DB_ECHO:-0}
      - ML_MODEL_URL=${ML_MODEL_URL:-http://ml-model-container:8000}
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build: .
    container_name: aqi-scheduler
    restart: unless-stopped
    command: ["python", "scheduler/scheduler.py"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-aqi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aqi_pass}
      - POSTGRES_DB=${POSTGRES_DB:-aqi}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - OWM_API_KEY=${OWM_API_KEY}
      - OWM_API_TIMEOUT=${OWM_API_TIMEOUT:-10}
      - CPCB_API_KEY=${CPCB_API_KEY}
      - CPCB_API_TIMEOUT=${CPCB_API_TIMEOUT:-10}
      - DB_ECHO=${DB_ECHO:-0}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    name: aqi_pgdata

networks:
  default:
    name: aq-intelligence-net
    external: true

